# ============
# 导航菜单
# ============
menu:
  主页:
    link: /
    icon: home
  博客:
    icon: message-circle
    item:
      博客首页:
        link: /blog/
        icon: panel-left
      分类:
        link: /categories/
        icon: folder
      标签:
        link: /tags/
        icon: tag
      归档:
        link: /archives/
        icon: archive
  作品:
    link: /works/
    icon: eye
  关于:
    link: /about/
    icon: user

# ============
# 个人信息
# ============
profile:
  role: HUMANGET
  bio: "Can't grasp simple things...What am I?"
  avatar:
  avatar_shape: circle
  site_info:
    posts: /archives/
  social:
    Bilibili: https://space.bilibili.com/
    GitHub: https://github.com/VixieTodd
  rss:
    enable: false

# ============
# 链接网格（左上角九宫格按钮）
# ============
nav:
  enable: true
  menu:
    - title: 社交
      item:
        - name: Bilibili
          link: https://space.bilibili.com/
          icon: bilibili
        - name: GitHub
          link: https://github.com/VixieTodd
          icon: github
    - title: 项目
      item:
        - name: Hippocampus
          link: https://github.com/VixieTodd/Hippocampus
          icon: github

# ============
# 欢迎区
# ============
welcome:
  label: VixieTodd 🦊
  title: 不及物哀，不达悲观
  text: 写东西、做视频、听术力口。偶尔弹琴，偶尔打音游，偶尔活着。
  cta_text: 查看博客
  cta_link: blog/

# ============
# 首页
# ============
# 首页文章卡片摘要字符数
excerpt_length: 96
# 侧边栏随机文章数量
random_posts: 1
# 相关文章数量
related_posts: 2

# 首页轮播置顶（最多 4 项）
featured:
  - start-openclaw
featured_autoplay: 5000

# ============
# 外观
# ============
color: green
tape:
  enable: true

# ============
# 标签样式
# ============
tags:
  style: tape

# ============
# 代码块
# ============
code:
  theme: dark

# ============
# 图片灯箱
# ============
fancybox:
  enable: true

# ============
# 页脚
# ============
footer:
  left: '© {year} By VixieTodd'
  right: "Powered by Theme {theme} &nbsp;|&nbsp; <a rel='license' href='https://creativecommons.org/licenses/by/4.0/' target='_blank'>CC BY 4.0</a>"

# ============
# 排行榜样式注入
# ============
inject:
  head:
    - >
      <style>
      .ranking-wrap{max-width:640px;margin:0 auto}
      .ranking-table{width:100%;border-collapse:collapse;font-size:15px}
      .ranking-table thead th{padding:10px 12px;border-bottom:2px solid var(--line);font-weight:700;text-align:center;color:var(--ink)}
      .ranking-table tbody td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:center;color:var(--ink)}
      .ranking-table tbody tr:nth-child(even){background:var(--paper-warm)}
      .ranking-table tbody tr:hover{background:var(--color-accent-soft)}
      .ranking-table tbody td:nth-child(2){text-align:left;font-weight:600}
      .ranking-table tbody td:nth-child(4){font-variant-numeric:tabular-nums}
      .ranking-table .rank-1 td:first-child{color:#d4a017;font-weight:800}
      .ranking-table .rank-2 td:first-child{color:#8a8a8a;font-weight:800}
      .ranking-table .rank-3 td:first-child{color:#b87333;font-weight:800}
      .ranking-table .rank-gray td{color:var(--muted)!important}
      </style>
  bottom:
