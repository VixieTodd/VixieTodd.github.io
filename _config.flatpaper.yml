# ============
# 导航菜单
# ============
menu:
  首页:
    link: /
    icon: home
  博客:
    link: /blog/
    icon: folder
  归档:
    link: /archives/
    icon: archive
  标签:
    link: /tags/
    icon: tag
  分类:
    link: /categories/
    icon: folder

# ============
# 个人信息
# ============
profile:
  role: 写点东西
  bio: "不及物哀，不达悲观。VOCALOID / 音游 / 视频创作 / 日常记录"
  avatar:
  avatar_shape: circle
  site_info:
    posts: /archives/
  social:
    Bilibili: https://space.bilibili.com/
    GitHub: https://github.com/VixieTodd
  rss:
    enable: false

# ============
# 欢迎区
# ============
welcome:
  label: VixieTodd 🦊
  title: 不及物哀，不达悲观
  text: 写东西、做视频、听术力口。偶尔弹琴，偶尔打音游，偶尔活着。
  cta_text: 查看博客
  cta_link: blog/

# ============
# 首页
# ============
# 首页文章卡片摘要字符数
excerpt_length: 96
# 侧边栏随机文章数量
random_posts: 5
# 相关文章数量
related_posts: 4

# 首页轮播置顶（最多 4 项）
featured:
  # - 文章slug

# ============
# 外观
# ============
color: green
tape:
  enable: true

# ============
# 标签样式
# ============
tags:
  style: tape

# ============
# 代码块
# ============
code:
  theme: dark

# ============
# 图片灯箱
# ============
fancybox:
  enable: true

# ============
# 页脚
# ============
footer:
  left: '© {year} By {name}'
  right: 'Powered by Theme {theme}'
