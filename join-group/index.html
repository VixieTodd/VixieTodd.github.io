<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入音游群</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 90vw;
    }
    .loading {
      font-size: 1.2rem;
      color: #666;
    }
    .error {
      color: #e74c3c;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="loading">正在跳转，请稍候…</div>
    <div class="error">群链接加载失败，请联系管理员</div>
  </div>

  <script>
    fetch('config.json?_=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const url = data.url;
        if (url) {
          document.querySelector('meta[http-equiv="refresh"]').content = '0;url=' + url;
          window.location.replace(url);
        } else {
          document.querySelector('.error').style.display = 'block';
          document.querySelector('.loading').style.display = 'none';
        }
      })
      .catch(() => {
        document.querySelector('.error').style.display = 'block';
        document.querySelector('.loading').style.display = 'none';
      });
  </script>
</body>
</html>
